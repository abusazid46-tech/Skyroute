<!DOCTYPE html>
<html>

<head>

<title>Skyroute Admin</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:40px
}

.card{
background:white;
padding:20px;
margin:20px 0;
border-radius:10px
}

input{
width:100%;
padding:10px;
margin:10px 0
}

button{
padding:10px 15px;
background:#ff6600;
color:white;
border:none
}

</style>

</head>

<body>

<h1>Skyroute Admin Panel</h1>

<div class="card">

<h3>Add Package</h3>

<input id="name" placeholder="Package name">

<input id="price" placeholder="Price">

<input id="duration" placeholder="Duration">

<input id="image" placeholder="Image URL">

<button onclick="addPackage()">Add Package</button>

</div>

<div class="card">

<h3>Existing Packages</h3>

<div id="packageList"></div>

</div>

<script src="admin.js"></script>

</body>

</html>
